name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  integration:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docker-backed integration tests become required with the data layer."

  browser:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Playwright becomes required with the interactive investigation flow."
